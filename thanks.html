<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Thank you — Élevé London</title>
  <link rel="icon" href="assets/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="site">
    <header class="site-header" id="site-header"></header>
    <main>
      <section class="section wrap">
        <div class="section-head">
          <span class="eyebrow">Confirmation</span>
          <h1>Thank you.</h1>
          <p id="confMsg">Your order is confirmed. A receipt has been sent to your email.</p>
        </div>
        <div id="detail" style="max-width: 640px; margin: 0 auto;"></div>
        <div class="center" style="margin-top: 40px;">
          <a class="btn" href="index.html">Back to home</a>
        </div>
      </section>
    </main>
    <footer class="site-footer" id="site-footer"></footer>
  </div>
  <script type="module">
    import { init } from "./js/app.js";
    import { currency } from "./js/cart.js";
    init();
    const params = new URLSearchParams(location.search);
    const last = JSON.parse(localStorage.getItem("eleve.lastOrder") || "null");
    const id = params.get("id") || last?.id;
    if (last && last.id === id) {
      document.getElementById("detail").innerHTML = `
        <div class="summary" style="position: static;">
          <h4>Order ${last.id}</h4>
          ${last.items.map(i => `<div class="row"><span>${i.name} × ${i.qty}</span><span>${currency(i.price * i.qty)}</span></div>`).join("")}
          <div class="row total"><span>Subtotal</span><span>${currency(last.subtotal)}</span></div>
          <div class="row" style="margin-top: 10px;"><span>Dispatch to</span><span>${last.customer.fname} ${last.customer.lname}, ${last.customer.city}</span></div>
        </div>
      `;
    }
  </script>
</body>
</html>
