<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Find your ÉLBM Therapist — Élevé London by Malika</title>
  <meta name="description" content="Find your ÉLBM Therapist. Trained under Malika's method, each practitioner holds their own diary and service area. View pricing and book." />
  <link rel="icon" href="assets/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="site">
    <header class="site-header" id="site-header"></header>

    <main>
      <section class="section wrap">
        <div class="section-head">
          <span class="eyebrow">Find your ÉLBM Therapist</span>
          <h1>Two dedicated diaries.</h1>
          <p>Both trained under Malika's method, both accountable to the same standard of care.</p>
        </div>

        <div class="team-list" id="therapistList"></div>
      </section>
    </main>

    <footer class="site-footer" id="site-footer"></footer>
  </div>

  <script type="module">
    import { init } from "./js/app.js";
    import { THERAPISTS, CATEGORIES, loadServices, PACKAGE_GROUPS, PACKAGE_CHILD_SLUGS } from "./data/data.js";
    import { therapistEligible } from "./js/booking.js";
    init();

    const services = await loadServices();
    const servicesBySlug = new Map(services.map(s => [s.slug, s]));
    const hasPhoto = (src) => typeof src === "string" && /\.(png|jpe?g|webp)$/i.test(src);

    // Everyone except Malika — she lives on the Services page
    const picks = THERAPISTS.filter(t => !t.hidden && t.id !== "malika");

    const ISABEL_MODEL_RATES = [
      {
        name: "Sculpt Detox®",
        bookingSlug: "eleve-sculpt-detox",
        rows: [
          { sessions: "1 session",  price: 95 },
          { sessions: "6 sessions", price: 450 },
        ],
      },
      {
        name: "Élevé Body Contour®",
        bookingSlug: "eleve-body-sculpt",
        rows: [
          { sessions: "Single session", price: 95 },
          { sessions: "6 sessions",     price: 450 },
        ],
      },
      {
        name: "SculptWood®",
        bookingSlug: "eleve-sculptwood-massage",
        rows: [
          { sessions: "Single session", price: 65 },
          { sessions: "6 sessions",     price: 250 },
        ],
      },
      {
        name: "Post-Operative Recovery",
        bookingSlug: "eleve-recovery-standard-360",
        rows: [
          { sessions: "10 sessions", price: 590 },
          { sessions: "12 sessions", price: 690 },
        ],
      },
    ];

    function modelRatesFor(t) {
      if (t.id !== "isabel") return "";
      return `
        <details class="therapist-prices therapist-prices--model">
          <summary>View Isabel's model rates · case-study programme</summary>
          <div class="therapist-prices__body">
            <p class="blurb" style="margin-bottom: 14px;">Isabel is taking on a small intake of model clients to build her case studies under The Élevé Method®. Each rate below is reserved for three models only.</p>
            ${ISABEL_MODEL_RATES.map(group => `
              <article class="model-rate-row">
                <div class="model-rate-row__head">
                  <h3>${group.name}</h3>
                  <span class="model-rate-row__badge">Limited to 3 models</span>
                </div>
                <ul class="model-rate-row__list">
                  ${group.rows.map(r => `
                    <li>
                      <span class="model-rate-row__sessions">${r.sessions}</span>
                      <span class="model-rate-row__price">£${r.price}</span>
                      <a class="model-rate-row__cta" href="book.html?svc=${encodeURIComponent(group.bookingSlug)}&therapist=isabel&rate=model">Enquire</a>
                    </li>
                  `).join("")}
                </ul>
              </article>
            `).join("")}
          </div>
        </details>
      `;
    }

    function priceListFor(t) {
      const eligible = services.filter(s => therapistEligible(t, s));
      const groups = CATEGORIES.map(cat => ({
        cat,
        items: eligible.filter(s => s.category === cat.id && !PACKAGE_CHILD_SLUGS.has(s.slug)),
      })).filter(g => g.items.length);
      if (!groups.length) return "";
      const therapistParam = `&therapist=${encodeURIComponent(t.id)}`;
      return `
        <details class="therapist-prices">
          <summary>View ${t.name}'s pricing</summary>
          <div class="therapist-prices__body">
            ${groups.map(g => `
              <section class="pricing-group">
                <h3>${g.cat.label}</h3>
                <p class="blurb">${g.cat.blurb}</p>
                ${g.items.map(s => {
                  const group = PACKAGE_GROUPS[s.slug];
                  const options = group ? [
                    { slug: s.slug, label: group.singleLabel },
                    ...group.packs.map(p => ({ slug: p.slug, label: p.label })),
                  ] : null;
                  return `
                    <div class="service-row" data-parent="${s.slug}">
                      <div>
                        <div class="name">${s.name}</div>
                        <div class="meta"><span data-duration>${s.durationLabel}</span>${s.deposit && Number(s.deposit) > 0 ? `<span data-deposit>Deposit £${Number(s.deposit).toFixed(0)}</span>` : `<span data-deposit hidden></span>`}</div>
                        ${options ? `
                          <label class="pack-picker">
                            <span class="pack-picker__label">Choose option</span>
                            <select class="pack-picker__select" data-pack-select data-therapist="${t.id}">
                              ${options.map(o => `<option value="${o.slug}">${o.label}</option>`).join("")}
                            </select>
                          </label>
                        ` : ""}
                      </div>
                      <div class="side">
                        <div class="price" data-price>£${Number(s.cost).toFixed(0)}</div>
                        <a class="btn btn--sm" data-book href="book.html?svc=${encodeURIComponent(s.slug)}${therapistParam}">Book</a>
                      </div>
                    </div>
                  `;
                }).join("")}
              </section>
            `).join("")}
          </div>
        </details>
      `;
    }

    function wirePackPickers(root) {
      root.querySelectorAll(".service-row[data-parent]").forEach(row => {
        const select = row.querySelector("[data-pack-select]");
        if (!select) return;
        const tId = select.dataset.therapist;
        const priceEl = row.querySelector("[data-price]");
        const bookEl = row.querySelector("[data-book]");
        const durationEl = row.querySelector("[data-duration]");
        const depositEl = row.querySelector("[data-deposit]");
        select.addEventListener("change", () => {
          const svc = servicesBySlug.get(select.value);
          if (!svc) return;
          priceEl.textContent = `£${Number(svc.cost).toFixed(0)}`;
          bookEl.href = `book.html?svc=${encodeURIComponent(svc.slug)}&therapist=${encodeURIComponent(tId)}`;
          if (durationEl) durationEl.textContent = svc.durationLabel || "";
          if (depositEl) {
            const dep = Number(svc.deposit);
            if (dep > 0) {
              depositEl.textContent = `Deposit £${dep.toFixed(0)}`;
              depositEl.hidden = false;
            } else {
              depositEl.textContent = "";
              depositEl.hidden = true;
            }
          }
        });
      });
    }

    const listEl = document.getElementById("therapistList");
    listEl.innerHTML = picks.map((t, i) => `
      <article class="about-practitioner ${i % 2 === 1 ? "about-practitioner--flip" : ""}">
        <div class="about-practitioner__visual">
          ${hasPhoto(t.avatar)
            ? `<img class="about-practitioner__photo" src="${t.avatar}" alt="${t.name}" loading="lazy" onerror="this.remove()"/>`
            : `<span class="about-practitioner__initial" aria-hidden="true">${t.name[0]}</span>`}
        </div>
        <div class="about-practitioner__body">
          <h4>${t.name}</h4>
          <div class="role">${t.title}</div>
          ${t.location ? `<div class="therapist-loc"><strong>${t.location}</strong>${t.serviceArea ? `<br/><span>${t.serviceArea}</span>` : ""}</div>` : ""}
          <p>${t.bio}</p>
          <div class="specialties">
            ${t.specialties.map(s => `<span class="pill">${s}</span>`).join("")}
          </div>
          <div style="margin-top: 18px;" class="hstack">
            <a class="btn btn--sm" href="book.html?therapist=${encodeURIComponent(t.id)}">Book with ${t.name}</a>
          </div>
          ${modelRatesFor(t)}
          ${priceListFor(t)}
        </div>
      </article>
    `).join("");

    wirePackPickers(listEl);
  </script>
</body>
</html>
