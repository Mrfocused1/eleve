<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>élevé London — Coming Soon</title>
    <meta
      name="description"
      content="élevé London by Malika — a new luxury label. Launching soon."
    />
    <meta name="theme-color" content="#d6cec2" />

    <link rel="icon" href="assets/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Jost:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="top">
        <span class="mark">ÉLEVÉ · LONDON</span>
      </header>

      <section class="hero">
        <div class="hero-visual" aria-label="élevé London by Malika">
          <img class="logo" src="assets/logo.png" alt="élevé" />
          <div class="lockup">
            <span class="lockup-main">LONDON</span>
            <span class="lockup-sub">By Malika</span>
          </div>
        </div>

        <p class="eyebrow">A new chapter, refined.</p>
        <h1 class="headline">Coming&nbsp;Soon</h1>
        <p class="lede">
          Thoughtfully crafted pieces, quietly arriving this season.
          Be the first to step inside.
        </p>

        <div class="countdown" aria-label="Time until launch">
          <div class="unit"><span class="num" data-unit="days">00</span><span class="lbl">Days</span></div>
          <div class="sep">·</div>
          <div class="unit"><span class="num" data-unit="hours">00</span><span class="lbl">Hours</span></div>
          <div class="sep">·</div>
          <div class="unit"><span class="num" data-unit="minutes">00</span><span class="lbl">Minutes</span></div>
          <div class="sep">·</div>
          <div class="unit"><span class="num" data-unit="seconds">00</span><span class="lbl">Seconds</span></div>
        </div>

        <form class="signup" id="signup" novalidate>
          <label class="sr-only" for="email">Email address</label>
          <input
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            placeholder="Your email address"
            required
          />
          <button type="submit">Notify Me</button>
          <p class="form-msg" id="formMsg" role="status" aria-live="polite"></p>
        </form>
      </section>

      <footer class="bottom">
        <nav class="social" aria-label="Social">
          <a href="#" aria-label="Instagram" class="ico">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path fill="none" stroke="currentColor" stroke-width="1.4" d="M3.5 7.5a4 4 0 0 1 4-4h9a4 4 0 0 1 4 4v9a4 4 0 0 1-4 4h-9a4 4 0 0 1-4-4z"/>
              <circle cx="12" cy="12" r="3.6" fill="none" stroke="currentColor" stroke-width="1.4"/>
              <circle cx="17.3" cy="6.7" r="1" fill="currentColor"/>
            </svg>
          </a>
          <a href="#" aria-label="TikTok" class="ico">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path fill="currentColor" d="M14 3h2.2c.2 1.8 1.3 3.2 3.3 3.5v2.2c-1.3 0-2.5-.3-3.5-.9v6.4a5.3 5.3 0 1 1-5.3-5.3c.3 0 .6 0 .9.1v2.3a3 3 0 1 0 2.1 2.9V3z"/>
            </svg>
          </a>
          <a href="mailto:hello@eleve.london" aria-label="Email" class="ico">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path fill="none" stroke="currentColor" stroke-width="1.4" d="M3.5 6.5h17v11h-17zM3.5 7l8.5 6 8.5-6"/>
            </svg>
          </a>
        </nav>

        <p class="copy">&copy; <span id="year"></span> élevé London · By Malika</p>
      </footer>
    </main>

    <script src="script.js" defer></script>
  </body>
</html>
