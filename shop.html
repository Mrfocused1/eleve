<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Élevé Store — Aftercare &amp; Home Ritual</title>
  <meta name="description" content="Shop Élevé aftercare, lymphatic tools and post-op compression. Curated by Malika to extend the results of your session between visits." />
  <link rel="icon" href="assets/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="site">
    <header class="site-header" id="site-header"></header>

    <main>
      <section class="hero-shop" aria-label="Élevé Store">
        <div class="hero-shop__text">
          <span class="eyebrow">Élevé Store</span>
          <h1>Aftercare &amp;<br/>home ritual.</h1>
          <p>Curated by Malika. Designed to extend the results of your session between visits.</p>
          <a class="hero-shop__link" href="#catTabs">Shop the edit <span aria-hidden="true">→</span></a>
        </div>
        <div class="hero-shop__image">
          <img src="assets/shop-hero.png" alt="Three women wearing Élevé shapewear" loading="eager" fetchpriority="high" />
        </div>
      </section>

      <section class="section wrap">
        <div class="store-status">
          <span class="store-status__pill store-status__pill--live">1 product available</span>
          <span class="store-status__pill store-status__pill--soon">New release coming soon</span>
        </div>

        <div class="tabs" id="catTabs"></div>
        <div class="grid grid--4" id="productGrid"></div>
      </section>
    </main>

    <footer class="site-footer" id="site-footer"></footer>
  </div>

  <script type="module">
    import { init, toast, updateCartBadge } from "./js/app.js";
    import { PRODUCTS } from "./data/data.js";
    import { addToCart, currency } from "./js/cart.js";
    init();

    const cats = ["All", ...new Set(PRODUCTS.map(p => p.category))];
    let active = "All";
    const tabsEl = document.getElementById("catTabs");
    const gridEl = document.getElementById("productGrid");

    function renderTabs() {
      tabsEl.innerHTML = cats.map(c => `<button class="tab ${c===active?"is-active":""}" data-cat="${c}">${c}</button>`).join("");
      tabsEl.querySelectorAll(".tab").forEach(b => b.addEventListener("click", () => { active = b.dataset.cat; renderTabs(); renderGrid(); }));
    }

    const COLOMBIAN_FLAG = `<span class="co-flag" title="Sourced from Colombia" aria-label="Sourced from Colombia"><span class="co-flag__y"></span><span class="co-flag__b"></span><span class="co-flag__r"></span></span>`;

    function renderGrid() {
      const list = active === "All" ? PRODUCTS : PRODUCTS.filter(p => p.category === active);
      gridEl.innerHTML = list.map(p => {
        const stockVariants = Array.isArray(p.stock) ? p.stock.filter(s => s.qty > 0) : null;
        const variants = p.variants || (stockVariants ? stockVariants.map(s => ({ id: s.size.toLowerCase(), label: s.size })) : null);
        const hasRichDetails = p.intro || p.subhead || (Array.isArray(p.features) && p.features.length);
        const hasDescription = !!p.description;
        const showDisclosure = hasRichDetails || hasDescription;
        const galleryImages = Array.isArray(p.images) && p.images.length > 1 ? p.images : null;
        return `
        <article class="product-card ${p.comingSoon ? "is-coming-soon" : ""}" id="${p.id}" ${galleryImages ? `data-gallery="${p.id}"` : ""}>
          <div class="img-wrap ${galleryImages ? "img-wrap--gallery" : ""}">
            ${p.colombian ? COLOMBIAN_FLAG : ""}
            ${p.comingSoon ? `<span class="coming-soon-badge">Coming Soon</span>` : ""}
            ${p.finalRelease ? `<span class="final-release-badge">Final Release</span>` : ""}
            <img class="product-gallery__main" src="${p.image}" alt="${p.name}" loading="lazy" onerror="this.onerror=null;this.src='assets/product-placeholder.svg';"/>
            ${galleryImages ? `
              <button class="product-gallery__nav product-gallery__nav--prev" aria-label="Previous image" type="button">
                <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" d="M9 2L4 7l5 5"/></svg>
              </button>
              <button class="product-gallery__nav product-gallery__nav--next" aria-label="Next image" type="button">
                <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" d="M5 2l5 5-5 5"/></svg>
              </button>
              <span class="product-gallery__counter"><span class="product-gallery__current">1</span> / ${galleryImages.length}</span>
            ` : ""}
          </div>
          <div class="body">
            <span class="cat">${p.category}${p.brand ? ` · ${p.brand}` : ""}</span>
            <span class="name">${p.name}</span>
            <span class="tag">${p.tagline}</span>
            ${showDisclosure || galleryImages || variants ? `
              <details class="product-details">
                <summary><span>View details</span><span class="product-details__icon" aria-hidden="true">+</span></summary>
                <div class="product-details__body">
                  ${p.intro ? `<p class="product-intro">${p.intro}</p>` : ""}
                  ${p.subhead ? `<p class="product-subhead">${p.subhead}</p>` : ""}
                  ${!hasRichDetails && hasDescription ? `<p class="product-description">${p.description}</p>` : ""}
                  ${Array.isArray(p.features) && p.features.length ? `
                    <ul class="product-features">
                      ${p.features.map(f => `<li>${f}</li>`).join("")}
                    </ul>
                  ` : ""}
                  ${stockVariants ? `
                    <ul class="stock-list" aria-label="Available stock by size">
                      ${stockVariants.map(s => `<li><span class="stock-list__qty">x${s.qty}</span><span class="stock-list__size">${s.size}</span></li>`).join("")}
                    </ul>
                  ` : ""}
                  ${variants ? `
                    <label class="product-size-label">Size</label>
                    <select class="product-size-select" data-variant="${p.id}" ${p.comingSoon ? "disabled" : ""}>
                      ${variants.map(v => `<option value="${v.id}">${v.label}</option>`).join("")}
                    </select>
                  ` : ""}
                  ${galleryImages ? `
                    <div class="product-gallery__thumbs" role="list">
                      ${galleryImages.map((src, i) => `
                        <button class="product-gallery__thumb ${i === 0 ? "is-active" : ""}" data-idx="${i}" aria-label="View image ${i+1}" type="button">
                          <img src="${src}" alt="" loading="lazy" />
                        </button>
                      `).join("")}
                    </div>
                  ` : ""}
                </div>
              </details>
            ` : ""}
            <div class="foot">
              <span class="price">${p.price != null ? currency(p.price) : "—"}</span>
              ${p.comingSoon ? "" : `<button class="btn btn--sm" data-add="${p.id}">Add to Bag</button>`}
            </div>
          </div>
        </article>
      `;
      }).join("");
      gridEl.querySelectorAll("[data-add]").forEach(b => b.addEventListener("click", () => {
        const id = b.dataset.add;
        const p = PRODUCTS.find(x => x.id === id);
        const variantEl = gridEl.querySelector(`[data-variant="${id}"]`);
        const variant = variantEl ? variantEl.value : null;
        addToCart({ kind: "product", id: p.id, name: p.name, price: p.price, variant, image: p.image });
        updateCartBadge();
        toast(`${p.name} added`);
      }));
      gridEl.querySelectorAll("[data-gallery]").forEach(card => {
        const p = PRODUCTS.find(x => x.id === card.dataset.gallery);
        if (!p || !Array.isArray(p.images)) return;
        const imgs = p.images;
        const mainImg = card.querySelector(".product-gallery__main");
        const counter = card.querySelector(".product-gallery__current");
        const thumbs = [...card.querySelectorAll(".product-gallery__thumb")];
        const prevBtn = card.querySelector(".product-gallery__nav--prev");
        const nextBtn = card.querySelector(".product-gallery__nav--next");
        let idx = 0;
        const show = (i) => {
          idx = (i + imgs.length) % imgs.length;
          if (mainImg) mainImg.src = imgs[idx];
          if (counter) counter.textContent = String(idx + 1);
          thumbs.forEach((t, j) => t.classList.toggle("is-active", j === idx));
          const active = thumbs[idx];
          if (active && active.scrollIntoView) active.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
        };
        thumbs.forEach((t, j) => t.addEventListener("click", () => show(j)));
        prevBtn?.addEventListener("click", () => show(idx - 1));
        nextBtn?.addEventListener("click", () => show(idx + 1));
      });
    }

    renderTabs(); renderGrid();
    if (location.hash) {
      const t = document.getElementById(location.hash.slice(1));
      if (t) t.scrollIntoView({ block: "center" });
    }
  </script>
</body>
</html>
