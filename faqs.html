<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FAQs — Élevé London</title>
  <meta name="description" content="Answers to common questions: consultations, packages, body sculpting, lymphatic drainage, fat dissolving, post-op care, payment plans and memberships." />
  <link rel="icon" href="assets/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="site">
    <header class="site-header" id="site-header"></header>

    <main>
      <section class="section wrap">
        <div class="section-head">
          <span class="eyebrow">FAQs</span>
          <h1>Questions we're asked often.</h1>
          <p>If you can't find your answer below, send us a message via <a href="contact.html">Contact</a> or WhatsApp.</p>
        </div>

        <div id="faqList" style="max-width: 860px; margin: 0 auto;"></div>

        <div class="center" style="margin-top: 40px;">
          <a class="btn" href="book.html">Book a Consultation</a>
        </div>
      </section>
    </main>

    <footer class="site-footer" id="site-footer"></footer>
  </div>

  <script type="module">
    import { init } from "./js/app.js";
    import { FAQ } from "./data/data.js";
    init();
    document.getElementById("faqList").innerHTML = FAQ.map(item => `
      <details class="faq-item">
        <summary>${item.q}</summary>
        <div class="a">${item.a}</div>
      </details>
    `).join("");
  </script>
</body>
</html>
